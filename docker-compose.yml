version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: jardineriav2_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jardineria
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3311:3306"
    networks:
      - laravel

  php:
    build:
      context: ./docker/php
    container_name: jardineriav2_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - mysql
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: jardineriav2_nginx
    restart: unless-stopped
    ports:
      - "8094:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - php
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: jardineriav2_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: laravel
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 100M
    ports:
      - "8095:80"
    depends_on:
      - mysql
    networks:
      - laravel



networks:
  laravel:
    driver: bridge

volumes:
  mysql_data: